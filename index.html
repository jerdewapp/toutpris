<script>
const manifestData = {
  name: "ToutPris — Liste de Courses",
  short_name: "ToutPris",
  description: "Gérez vos listes de courses facilement",
  start_url: "./",
  display: "standalone",
  background_color: "#f0f4f8",
  theme_color: "#1a3c5e",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%231a3c5e'/%3E%3Cpath d='M52 75h88l-11 72H63L52 75z' fill='white' fill-opacity='.95'/%3E%3Cpath d='M76 75c0-11 9-20 20-20s20 9 20 20' stroke='%23f97316' stroke-width='11' stroke-linecap='round' fill='none'/%3E%3Crect x='80' y='100' width='32' height='8' rx='4' fill='%23f97316'/%3E%3Ccircle cx='83' cy='120' r='6' fill='%23f97316'/%3E%3Ccircle cx='109' cy='120' r='6' fill='%23f97316'/%3E%3C/svg%3E", sizes: "192x192", type: "image/svg+xml" },
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%231a3c5e'/%3E%3Cpath d='M138 200h236l-29 192H167L138 200z' fill='white' fill-opacity='.95'/%3E%3Cpath d='M202 200c0-30 24-54 54-54s54 24 54 54' stroke='%23f97316' stroke-width='30' stroke-linecap='round' fill='none'/%3E%3Crect x='214' y='267' width='84' height='21' rx='10' fill='%23f97316'/%3E%3Ccircle cx='221' cy='320' r='16' fill='%23f97316'/%3E%3Ccircle cx='291' cy='320' r='16' fill='%23f97316'/%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
const manifestURL = URL.createObjectURL(blob);
const link = document.createElement('link');
link.rel = 'manifest'; link.href = manifestURL;
document.currentScript.after(link);
</script>

<script>
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'toutpris-v1';
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./'])));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('./'))));
});`;
  const swBlob = new Blob([swCode], {type: 'application/javascript'});
  const swURL = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL).catch(()=>{});
}
</script>

<style>

  main { max-width: 480px; margin: 0 auto; padding: 14px 12px 100px; }

  .modal { background: white; width: 100%; max-width: 480px; border-radius: 22px 22px 0 0; padding: 20px 20px 40px; animation: slideUp 0.28s cubic-bezier(.4,0,.2,1); max-height: 90vh; overflow-y: auto; }

<script>
const RAYONS = [
  { name: "Fruits & Légumes", emoji: "🥦" },
  { name: "Frais (laitages / œufs)", emoji: "🧀" },
  { name: "Boucherie / Charcuterie", emoji: "🥩" },
  { name: "Poissonnerie", emoji: "🐟" },
  { name: "Surgelés", emoji: "❄️" },
  { name: "Épicerie sèche", emoji: "🌾" },
  { name: "Pâtes / Riz / Céréales", emoji: "🍝" },
  { name: "Conserves", emoji: "🥫" },
  { name: "Boissons", emoji: "🥤" },
  { name: "Vins & Spiritueux", emoji: "🍷" },
  { name: "Boulangerie / Pâtisserie", emoji: "🥖" },
  { name: "Confiserie / Snacks", emoji: "🍫" },
  { name: "Petit-déjeuner / Café", emoji: "☕" },
  { name: "Sauces / Condiments", emoji: "🫙" },
  { name: "Hygiène / Beauté", emoji: "🧴" },
  { name: "Entretien / Ménage", emoji: "🧹" },
  { name: "Bébé", emoji: "🍼" },
  { name: "Animalerie", emoji: "🐾" },
  { name: "Maison / Cuisine", emoji: "🍳" },
  { name: "Papeterie / Bureau", emoji: "✏️" },
  { name: "Pharmacie / Santé", emoji: "💊" },
  { name: "Textile / Linge", emoji: "🧺" },
  { name: "Autre", emoji: "📦" },
];
const EMOJI_MAP = Object.fromEntries(RAYONS.map(r => [r.name, r.emoji]));

let state = { lists: [], activeIdx: null, catalog: [] };
let acSelected = -1;
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  if (!localStorage.getItem('toutpris_install_dismissed'))
    document.getElementById('installBanner').classList.add('show');
});
window.addEventListener('appinstalled', () => document.getElementById('installBanner').classList.remove('show'));
function installApp() {
  if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(() => { deferredPrompt=null; document.getElementById('installBanner').classList.remove('show'); }); }
}
function dismissInstall() { localStorage.setItem('toutpris_install_dismissed','1'); document.getElementById('installBanner').classList.remove('show'); }

function updateOffline() { document.getElementById('offlineBar').classList.toggle('show', !navigator.onLine); }
window.addEventListener('online', updateOffline);
window.addEventListener('offline', updateOffline);
updateOffline();

function save() { try { localStorage.setItem('toutpris_v1', JSON.stringify(state)); } catch(e) {} }
function load() {
  try { const d = localStorage.getItem('toutpris_v1'); if (d) state = JSON.parse(d); if (!state.catalog) state.catalog = []; } catch(e) {}
}

function addToCatalog(name, rayon, unit) {
  const key = name.toLowerCase().trim();
  const i = state.catalog.findIndex(c => c.key === key);
  if (i >= 0) { state.catalog[i].rayon=rayon; state.catalog[i].unit=unit||state.catalog[i].unit; state.catalog[i].count=(state.catalog[i].count||1)+1; }
  else state.catalog.push({ key, name: name.trim(), rayon, unit: unit||'', count: 1 });
}

function searchCatalog(q) {
  if (!q) return [];
  const low = q.toLowerCase();
  return state.catalog.filter(c=>c.key.includes(low)).sort((a,b)=>(b.count||1)-(a.count||1)).slice(0,7);
}

function onProdInput() {
  acSelected = -1;
  const q = document.getElementById('prodName').value;
  const results = searchCatalog(q);
  const box = document.getElementById('acList');
  if (!results.length||!q) { box.style.display='none'; return; }
  box.innerHTML = results.map((c,i) =>
    `<div class="ac-item" onclick="selectAC(${i})">
      <span class="ac-emoji">${EMOJI_MAP[c.rayon]||'📦'}</span>
      <div style="flex:1"><div class="ac-name">${hl(c.name,q)}</div><div class="ac-meta">${c.rayon}${c.unit?' · '+c.unit:''}</div></div>
    </div>`).join('');
  box._results = results;
  box.style.display = 'block';
}

function hl(name, q) {
  const i = name.toLowerCase().indexOf(q.toLowerCase());
  if (i<0) return name;
  return name.slice(0,i)+'<b style="color:var(--primary-mid)">'+name.slice(i,i+q.length)+'</b>'+name.slice(i+q.length);
}

function onProdKey(e) {
  const box = document.getElementById('acList');
  const items = box.querySelectorAll('.ac-item');
  if (!items.length) return;
  if (e.key==='ArrowDown') { acSelected=Math.min(acSelected+1,items.length-1); items.forEach((el,i)=>el.style.background=i===acSelected?'var(--bg)':''); e.preventDefault(); }
  else if (e.key==='ArrowUp') { acSelected=Math.max(acSelected-1,0); items.forEach((el,i)=>el.style.background=i===acSelected?'var(--bg)':''); e.preventDefault(); }
  else if (e.key==='Enter'&&acSelected>=0) { selectAC(acSelected); e.preventDefault(); }
  else if (e.key==='Escape') { box.style.display='none'; }
}

function selectAC(i) {
  const box = document.getElementById('acList');
  const r = box._results[i];
  document.getElementById('prodName').value = r.name;
  document.getElementById('prodUnit').value = r.unit||'';
  const sel = document.getElementById('prodRayon');
  for (let o of sel.options) if (o.value===r.rayon) { o.selected=true; break; }
  box.style.display='none';
  const found = state.catalog.find(c=>c.key===r.name.toLowerCase().trim());
  document.getElementById('catalogNote').innerHTML = found ? `✅ Produit reconnu — ajouté <b>${found.count||1} fois</b>` : '';
}

function render() { renderTabs(); renderContent(); updateGlobalBadge(); }

function updateGlobalBadge() {
  let t=0; state.lists.forEach(l=>t+=(l.items||[]).length);
  document.getElementById('globalBadge').textContent = t+' produit'+(t>1?'s':'');
}

function renderTabs() {
  const el = document.getElementById('listTabs');
  if (!state.lists.length) { el.innerHTML='<span style="font-size:0.76rem;color:#aaa;padding:6px 0">Aucune liste</span>'; return; }
  el.innerHTML = state.lists.map((l,i) => {
    const cnt=(l.items||[]).length;
    return `<div class="list-tab ${i===state.activeIdx?'active':''}" onclick="setActive(${i})">${l.type.split(' ')[0]} ${l.name}${cnt?' ('+cnt+')':''}</div>`;
  }).join('');
}

function renderContent() {
  const el = document.getElementById('listContent');
  if (!state.lists.length||state.activeIdx===null) {
    el.innerHTML=`<div class="no-list"><div class="icon">🛍️</div><p>Aucune liste pour l'instant.<br>Appuyez sur <b>+ Nouvelle liste</b> pour commencer !</p></div>`;
    return;
  }
  const list = state.lists[state.activeIdx];
  const items = list.items||[];
  const done = items.filter(i=>i.done).length;
  const pct = items.length ? Math.round(done/items.length*100) : 0;
  const byRayon = {};
  items.forEach((item,idx) => { if (!byRayon[item.rayon]) byRayon[item.rayon]=[]; byRayon[item.rayon].push({...item,_idx:idx}); });

  let html = `<div class="card">
    <div class="list-info-bar">
      <div>
        <div class="list-title-big">${list.name}</div>
        <div class="list-type-chip">${list.type}</div>
      </div>
      <button class="btn btn-accent btn-sm" onclick="openAddProduct()">＋ Produit</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label"><span>${done} récupéré${done>1?'s':''}</span><span>${pct}% — ${items.length} article${items.length>1?'s':''}</span></div>
    </div>
  </div>`;

  if (!items.length) {
    html+=`<div class="empty"><div class="empty-icon">🛒</div><p>Liste vide.<br>Appuyez sur <b style="color:var(--accent)">+ Produit</b> pour ajouter des articles.</p></div>`;
  } else {
    RAYONS.forEach(r => {
      const grp=byRayon[r.name]; if (!grp||!grp.length) return;
      html+=`<div class="card rayon-section">
        <div class="rayon-header"><span style="font-size:1.1rem">${r.emoji}</span>${r.name}<span class="rayon-badge">${grp.length}</span></div>
        <div class="rayon-items">`;
      grp.forEach(item => {
        html+=`<div class="product-item ${item.done?'done':''}" onclick="toggleItem(${item._idx})">
          <span class="prod-emoji">${EMOJI_MAP[item.rayon]||'📦'}</span>
          <div class="product-info">
            <div class="prod-name">${item.name}</div>
            <div class="prod-detail">${item.qty} × ${item.unit||'unité'}</div>
          </div>
          <span class="prod-check">${item.done?'✓':''}</span>
          <button class="prod-del" onclick="event.stopPropagation();deleteItem(${item._idx})">✕</button>
        </div>`;
      });
      html+=`</div></div>`;
    });
  }
  el.innerHTML = html;
}

function setActive(i) { state.activeIdx=i; save(); render(); }

function openNewListModal() {
  document.getElementById('newListName').value='';
  document.getElementById('newListOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('newListName').focus(),150);
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function createList() {
  const name=document.getElementById('newListName').value.trim();
  const type=document.getElementById('newListType').value;
  if (!name) { document.getElementById('newListName').focus(); return; }
  state.lists.push({name,type,items:[]});
  state.activeIdx=state.lists.length-1;
  closeModal('newListOverlay'); save(); render();
}

function deleteCurrentList() {
  if (state.activeIdx===null||!state.lists.length) return;
  if (!confirm(`Supprimer la liste "${state.lists[state.activeIdx].name}" ?`)) return;
  state.lists.splice(state.activeIdx,1);
  state.activeIdx=state.lists.length?Math.max(0,state.activeIdx-1):null;
  save(); render();
}

function openAddProduct() {
  const sel=document.getElementById('prodRayon');
  sel.innerHTML=RAYONS.map(r=>`<option value="${r.name}">${r.emoji} ${r.name}</option>`).join('');
  document.getElementById('prodName').value='';
  document.getElementById('prodQty').value='1';
  document.getElementById('prodUnit').value='';
  document.getElementById('catalogNote').innerHTML='';
  document.getElementById('acList').style.display='none';
  document.getElementById('addProductOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('prodName').focus(),150);
}

function addProduct() {
  const name=document.getElementById('prodName').value.trim();
  if (!name) { document.getElementById('prodName').focus(); return; }
  const qty=parseInt(document.getElementById('prodQty').value)||1;
  const unit=document.getElementById('prodUnit').value.trim()||'unité';
  const rayon=document.getElementById('prodRayon').value;
  state.lists[state.activeIdx].items.push({name,qty,unit,rayon,done:false});
  addToCatalog(name,rayon,unit);
  document.getElementById('prodName').value='';
  document.getElementById('prodQty').value='1';
  document.getElementById('prodUnit').value='';
  document.getElementById('acList').style.display='none';
  document.getElementById('catalogNote').innerHTML='';
  document.getElementById('prodName').focus();
  save(); render();
}

function toggleItem(idx) { state.lists[state.activeIdx].items[idx].done=!state.lists[state.activeIdx].items[idx].done; save(); render(); }
function deleteItem(idx) { state.lists[state.activeIdx].items.splice(idx,1); save(); render(); }

function openMergeModal() {
  if (state.lists.length<2) { alert('Il faut au moins 2 listes pour fusionner.'); return; }
  const sel=document.getElementById('mergeSource');
  sel.innerHTML=state.lists.map((l,i)=>i===state.activeIdx?'':
    `<option value="${i}">${l.type} ${l.name}</option>`).join('');
  document.getElementById('mergeOverlay').classList.add('open');
}

function mergeLists() {
  const srcIdx=parseInt(document.getElementById('mergeSource').value);
  state.lists[srcIdx].items.forEach(item=>state.lists[state.activeIdx].items.push({...item,done:false}));
  closeModal('mergeOverlay'); save(); render();
}

document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
document.addEventListener('click',e=>{if(!e.target.closest('.autocomplete-wrap'))document.getElementById('acList').style.display='none';});

load();
if (state.activeIdx===null&&state.lists.length) state.activeIdx=0;
render();
</script>
</body>
</html>
